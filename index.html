<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Minhas Aulas"/>
<meta name="theme-color" content="#1a1a2e"/>
<title>Minhas Aulas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap');

  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --accent: #7c6fff;
    --accent2: #a594ff;
    --text: #f0eeff;
    --muted: #8887a8;
    --success: #4ade80;
    --danger: #f87171;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    max-width: 430px;
    margin: 0 auto;
    padding-bottom: 80px;
  }

  .header {
    padding: 56px 20px 20px;
    background: linear-gradient(180deg, #1a1a2e 0%, transparent 100%);
    position: sticky;
    top: 0;
    z-index: 10;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .header h1 { font-family: var(--mono); font-size: 13px; font-weight: 500; color: var(--accent2); letter-spacing: .12em; text-transform: uppercase; margin-bottom: 4px; }
  .header .subtitle { font-size: 22px; font-weight: 600; color: var(--text); }

  .nav {
    display: flex;
    gap: 6px;
    padding: 0 20px 16px;
    position: sticky;
    top: 88px;
    z-index: 9;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }
  .nav button {
    flex: 1;
    padding: 9px 4px;
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--surface);
    color: var(--muted);
    cursor: pointer;
    transition: all .2s;
  }
  .nav button.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  .screen { display: none; padding: 0 20px; }
  .screen.active { display: block; }

  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: .1em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    padding: 13px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    font-family: var(--sans);
    font-size: 16px;
    color: var(--text);
    outline: none;
    transition: border-color .2s;
    -webkit-appearance: none;
    appearance: none;
  }
  .field input:focus { border-color: var(--accent); }
  .field input::placeholder { color: var(--muted); }
  input[type="date"]::-webkit-calendar-picker-indicator { filter: invert(1) opacity(.3); }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .btn {
    width: 100%;
    padding: 15px;
    margin-top: 8px;
    font-family: var(--sans);
    font-size: 16px;
    font-weight: 600;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: all .2s;
    letter-spacing: .02em;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:active { transform: scale(.97); opacity: .85; }
  .btn-outline { background: var(--surface); color: var(--text); border: 1px solid var(--border2); }
  .btn-outline:active { transform: scale(.97); }

  .btn-csv {
    width: 100%;
    padding: 13px;
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 500;
    border: 1px dashed rgba(165,148,255,0.4);
    border-radius: 14px;
    background: transparent;
    color: var(--accent2);
    cursor: pointer;
    transition: all .2s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-top: 6px;
  }
  .btn-csv:active { opacity: .7; transform: scale(.97); }
  .btn-csv svg { width: 16px; height: 16px; flex-shrink: 0; }

  .toast {
    position: fixed;
    top: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(-12px);
    background: var(--success);
    color: #0a2e1a;
    padding: 10px 20px;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 600;
    opacity: 0;
    transition: all .3s;
    pointer-events: none;
    z-index: 999;
    white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.err { background: var(--danger); color: #2e0a0a; }

  .section-label { font-family: var(--mono); font-size: 11px; font-weight: 500; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; margin-bottom: 10px; margin-top: 4px; }

  .hist-item { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .hist-item .info { flex: 1; min-width: 0; }
  .hist-item .nome { font-size: 15px; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hist-item .meta { font-family: var(--mono); font-size: 12px; color: var(--muted); }
  .hist-item .total { font-family: var(--mono); font-size: 15px; font-weight: 500; color: var(--accent2); white-space: nowrap; }
  .del-btn { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 18px; padding: 4px; line-height: 1; transition: color .2s; }
  .del-btn:hover { color: var(--danger); }

  .empty { text-align: center; color: var(--muted); font-size: 14px; padding: 3rem 0; font-family: var(--mono); }

  .periodo-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }

  .metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
  .metric-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px; }
  .metric-card .m-label { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: .08em; text-transform: uppercase; margin-bottom: 6px; }
  .metric-card .m-value { font-family: var(--mono); font-size: 20px; font-weight: 500; color: var(--text); }
  .metric-card .m-value.accent { color: var(--accent2); }

  .aluno-block { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; }
  .aluno-block .a-nome { font-size: 15px; font-weight: 600; margin-bottom: 10px; }
  .a-linha { display: flex; justify-content: space-between; font-size: 13px; color: var(--muted); margin-bottom: 4px; }
  .a-linha span:last-child { font-family: var(--mono); color: var(--text); font-weight: 500; }
  .a-total { display: flex; justify-content: space-between; font-size: 14px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
  .a-total span:first-child { color: var(--muted); }
  .a-total span:last-child { font-family: var(--mono); font-weight: 600; color: var(--accent2); font-size: 15px; }

  .divider { height: 1px; background: var(--border); margin: 16px 0; }
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="header">
  <h1>professor</h1>
  <div class="subtitle">Controle de Aulas</div>
</div>

<div class="nav">
  <button class="active" onclick="go('registrar')">Registrar</button>
  <button onclick="go('historico')">Histórico</button>
  <button onclick="go('relatorio')">Relatório</button>
</div>

<!-- REGISTRAR -->
<div class="screen active" id="registrar">
  <div class="field">
    <label>Data</label>
    <input type="date" id="data"/>
  </div>
  <div class="field">
    <label>Nome do aluno</label>
    <input type="text" id="aluno" placeholder="Ex: João Silva" autocomplete="off"/>
  </div>
  <div class="row2">
    <div class="field">
      <label>Horas</label>
      <input type="number" id="horas" placeholder="1.5" step="0.5" min="0.5"/>
    </div>
    <div class="field">
      <label>R$/hora</label>
      <input type="number" id="valor" placeholder="80" step="1" min="0"/>
    </div>
  </div>
  <button class="btn btn-primary" onclick="salvar()">Salvar aula</button>
</div>

<!-- HISTÓRICO -->
<div class="screen" id="historico">
  <div class="section-label">Todas as aulas</div>
  <div id="lista-historico"></div>
  <button class="btn-csv" onclick="exportarCSV('tudo')" style="margin-top:16px">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Exportar tudo em CSV
  </button>
</div>

<!-- RELATÓRIO -->
<div class="screen" id="relatorio">
  <div class="periodo-row">
    <div class="field" style="margin-bottom:0">
      <label>De</label>
      <input type="date" id="de"/>
    </div>
    <div class="field" style="margin-bottom:0">
      <label>Até</label>
      <input type="date" id="ate"/>
    </div>
  </div>
  <button class="btn btn-outline" onclick="gerarRelatorio()" style="margin-top:12px;margin-bottom:20px">Gerar relatório</button>
  <div id="resultado-relatorio"></div>
  <div id="csv-periodo-btn"></div>
</div>

<script>
const DB = 'prof_aulas_v2';
function load() { try { return JSON.parse(localStorage.getItem(DB) || '[]'); } catch(e) { return []; } }
function save(d) { localStorage.setItem(DB, JSON.stringify(d)); }

function go(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav button').forEach((b, i) => {
    b.classList.toggle('active', ['registrar','historico','relatorio'][i] === id);
  });
  document.getElementById(id).classList.add('active');
  if (id === 'historico') renderHistorico();
}

let toastTimer;
function toast(msg, err) {
  clearTimeout(toastTimer);
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (err ? ' err' : '') + ' show';
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

function salvar() {
  const data  = document.getElementById('data').value;
  const aluno = document.getElementById('aluno').value.trim();
  const horas = parseFloat(document.getElementById('horas').value);
  const valor = parseFloat(document.getElementById('valor').value);
  if (!data || !aluno || !horas || !valor) { toast('Preencha todos os campos', true); return; }
  const d = load();
  d.push({ id: Date.now(), data, aluno, horas, valor, total: horas * valor });
  save(d);
  document.getElementById('aluno').value = '';
  document.getElementById('horas').value = '';
  document.getElementById('valor').value = '';
  toast('Aula registrada!');
}

function renderHistorico() {
  const d = load().sort((a, b) => b.data.localeCompare(a.data));
  const el = document.getElementById('lista-historico');
  if (!d.length) { el.innerHTML = '<div class="empty">nenhuma aula registrada</div>'; return; }
  el.innerHTML = d.map(a => `
    <div class="hist-item">
      <div class="info">
        <div class="nome">${esc(a.aluno)}</div>
        <div class="meta">${fmtData(a.data)} &middot; ${a.horas}h &middot; R$${a.valor}/h</div>
      </div>
      <div class="total">R$${fmtVal(a.total)}</div>
      <button class="del-btn" onclick="deletar(${a.id})">&#x2715;</button>
    </div>
  `).join('');
}

function deletar(id) {
  if (!confirm('Remover este registro?')) return;
  save(load().filter(a => a.id !== id));
  renderHistorico();
  toast('Registro removido');
}

function fmtData(s) { const [y, m, d] = s.split('-'); return `${d}/${m}/${y}`; }
function fmtVal(n) { return Number(n).toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function exportarCSV(modo) {
  let dados = load();
  let nomeArquivo = 'aulas_todas.csv';

  if (modo === 'periodo') {
    const de  = document.getElementById('de').value;
    const ate = document.getElementById('ate').value;
    if (!de || !ate) { toast('Gere o relatório primeiro', true); return; }
    dados = dados.filter(a => a.data >= de && a.data <= ate);
    nomeArquivo = 'aulas_' + de + '_' + ate + '.csv';
  }

  if (!dados.length) { toast('Nenhuma aula para exportar', true); return; }

  const header = 'Data;Aluno;Horas;Valor por Hora (R$);Total (R$)';
  const linhas = dados
    .sort((a, b) => a.data.localeCompare(b.data))
    .map(a => [
      fmtData(a.data),
      '"' + a.aluno.replace(/"/g, '""') + '"',
      String(a.horas).replace('.', ','),
      a.valor.toFixed(2).replace('.', ','),
      a.total.toFixed(2).replace('.', ',')
    ].join(';'));

  const csv  = '\uFEFF' + header + '\n' + linhas.join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href  = url;
  link.download = nomeArquivo;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  URL.revokeObjectURL(url);
  toast('CSV baixado!');
}

function gerarRelatorio() {
  const de  = document.getElementById('de').value;
  const ate = document.getElementById('ate').value;
  if (!de || !ate) { toast('Escolha o período', true); return; }

  const d  = load().filter(a => a.data >= de && a.data <= ate);
  const el = document.getElementById('resultado-relatorio');

  if (!d.length) { el.innerHTML = '<div class="empty">nenhuma aula no período</div>'; return; }

  const totalGeral = d.reduce((s, a) => s + a.total, 0);
  const totalHoras = d.reduce((s, a) => s + a.horas, 0);

  const porAluno = {};
  d.forEach(a => {
    if (!porAluno[a.aluno]) porAluno[a.aluno] = { horas: 0, total: 0, aulas: [] };
    porAluno[a.aluno].horas += a.horas;
    porAluno[a.aluno].total += a.total;
    porAluno[a.aluno].aulas.push(a);
  });

  const alunosHtml = Object.entries(porAluno)
    .sort((a, b) => b[1].total - a[1].total)
    .map(([nome, v]) => `
      <div class="aluno-block">
        <div class="a-nome">${esc(nome)}</div>
        <div class="a-linha"><span>Horas de aula</span><span>${v.horas}h</span></div>
        <div class="a-linha"><span>Aulas realizadas</span><span>${v.aulas.length}</span></div>
        <div class="a-total"><span>Total devido</span><span>R$${fmtVal(v.total)}</span></div>
      </div>
    `).join('');

  el.innerHTML = `
    <div class="section-label">Resumo</div>
    <div class="metric-grid">
      <div class="metric-card">
        <div class="m-label">Total do período</div>
        <div class="m-value accent">R$${fmtVal(totalGeral)}</div>
      </div>
      <div class="metric-card">
        <div class="m-label">Horas dadas</div>
        <div class="m-value">${totalHoras}h</div>
      </div>
    </div>
    <div class="divider"></div>
    <div class="section-label">Por aluno</div>
    ${alunosHtml}
  `;

  document.getElementById('csv-periodo-btn').innerHTML = `
    <button class="btn-csv" onclick="exportarCSV('periodo')" style="margin-top:8px;margin-bottom:20px">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Exportar período em CSV
    </button>
  `;
}

// defaults
const hoje = new Date();
const pad = n => String(n).padStart(2, '0');
const isoHoje   = hoje.getFullYear() + '-' + pad(hoje.getMonth()+1) + '-' + pad(hoje.getDate());
const isoInicio = hoje.getFullYear() + '-' + pad(hoje.getMonth()+1) + '-01';
document.getElementById('data').value = isoHoje;
document.getElementById('de').value   = isoInicio;
document.getElementById('ate').value  = isoHoje;
</script>
</body>
</html>
